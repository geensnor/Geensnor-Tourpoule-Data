---
name: Test
on: [workflow_call]
jobs:
  lint:
    uses: ./.github/workflows/lint.yml
  test:
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js current
        uses: actions/setup-node@v6
        with:
          node-version: current
      - run: npm ci
      - run: npm test
